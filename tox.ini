[tox]
requires =
    tox>=4
    tox-uv
# Django 6.0 requires Python >=3.12 (5.2.x is the last series to support
# 3.10/3.11), so the matrix is NOT a full cross product:
#   - py310/py311 -> Django 5.2 only
#   - py312/py313/py314 -> Django 5.2 and 6.0
env_list =
    py3{10,11}-django52
    py3{12,13,14}-django{52,60}
    lint

# uv-venv-runner is auto-selected by tox-uv; uv downloads any missing
# interpreter (e.g. 3.14) on demand.
[testenv]
description = Smoke/import check under {basepython} with the pinned Django
deps =
    django52: Django>=5.2,<6.0
    django60: Django>=6.0,<6.1
commands =
    python -c "import codenerix; print('codenerix', codenerix.__version__)"
    # pytest      # enable once tests + DJANGO_SETTINGS_MODULE exist

[testenv:lint]
description = Lint + type-check against the 3.10 floor (config-driven)
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    ruff check codenerix
    ruff format --check codenerix
    mypy -p codenerix
    basedpyright codenerix
