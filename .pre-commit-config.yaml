# Pre-commit for django-codenerix (single package).
# Pattern aligned with the channels monorepo:
#   - ruff (lint + format) and uv-lock run from pinned mirrors
#   - type-checkers (mypy / pylint / basedpyright) run via `uv run` so they
#     resolve the project venv and all imports. Run `uv sync` once first.
default_language_version:
  python: python3.10

repos:
  # ==========================================================================
  # Standard hooks
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: destroyed-symlinks
      - id: detect-private-key

  # ==========================================================================
  # Ruff — replaces black, isort, flake8, pyupgrade, add-trailing-comma
  # ==========================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix]
      - id: ruff-format
        name: ruff (format)

  # ==========================================================================
  # uv — keep the lockfile in sync
  # NOTE: rev must track the uv you actually run locally; the uv.lock has a
  # format/revision field, and an older hook would rewrite it in a stale
  # format on every run (lock churn / failures).
  # ==========================================================================
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.19
    hooks:
      - id: uv-lock

  # ==========================================================================
  # Type-checkers via uv run (need the project venv + resolved imports).
  # Single package: one hook each, config auto-discovered from pyproject.toml.
  # ==========================================================================
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        files: ^codenerix/.*\.py$
        exclude: ^codenerix/(.*/)?(migrations|tests)/
        pass_filenames: true

      - id: pylint
        name: pylint
        entry: uv run pylint -j1
        language: system
        files: ^codenerix/.*\.py$
        exclude: ^codenerix/(.*/)?(migrations|tests)/
        pass_filenames: true

      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright codenerix
        language: system
        files: ^codenerix/.*\.py$
        pass_filenames: false

      - id: pymarkdown
        name: pymarkdown
        entry: uv run pymarkdown scan
        language: system
        types: [markdown]
        require_serial: true

  # ==========================================================================
  # Misc
  # ==========================================================================
  - repo: https://github.com/get-woke/woke
    rev: v0.19.0
    hooks:
      - id: woke-from-source
        exclude: |
          (?x)^(
            CHANGELOG
            | codenerix/static/
            | codenerix/lib/adminmail\.py
          )

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        args: ["-r", "-lll"]

exclude: >
  (?x)(
      \.env
    | \.git
    | \.tox
    | \.venv
    | __pycache__
    | _build
    | build
    | dist
    | codenerix/static/
  )
