name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancela runs antiguos del mismo ref si llega uno nuevo
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Sync (dev)
        run: uv sync
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  types:
    name: Type check (mypy + basedpyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Sync (dev)
        run: uv sync
      - name: mypy
        run: uv run mypy codenerix
      - name: basedpyright
        run: uv run basedpyright codenerix

  test:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Sync (dev)
        run: uv sync --python ${{ matrix.python-version }}
      - name: pytest
        # Necesita DJANGO_SETTINGS_MODULE; lo fijamos en
        # [tool.pytest.ini_options] del pyproject (igual que en channels).
        run: uv run pytest
